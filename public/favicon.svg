<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#032EA1"/>
      <stop offset="55%"  stop-color="#1a4fcc"/>
      <stop offset="100%" stop-color="#8B0020"/>
    </linearGradient>

    <!-- Heart inner gradient -->
    <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#dde8ff" stop-opacity="0.92"/>
    </linearGradient>

    <!-- Glow behind heart -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background rounded square ── -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <ellipse cx="256" cy="110" rx="220" ry="95" fill="white" opacity="0.07"/>

  <!-- ── Heart glow layer ── -->
  <path filter="url(#glow)"
    d="M256 378 C198 336,84 274,84 182
       C84 116,142 80,198 80
       C227 80,248 96,256 118
       C264 96,285 80,314 80
       C370 80,428 116,428 182
       C428 274,314 336,256 378 Z"
    fill="white" opacity="0.18"/>

  <!-- ── Heart main shape ── -->
  <path
    d="M256 378 C198 336,84 274,84 182
       C84 116,142 80,198 80
       C227 80,248 96,256 118
       C264 96,285 80,314 80
       C370 80,428 116,428 182
       C428 274,314 336,256 378 Z"
    fill="url(#hg)"/>

  <!-- ── Gold sparkle inside heart ── -->
  <!-- top-center diamond sparkle -->
  <polygon points="256,148 262,160 256,172 250,160"
    fill="#F5A623" opacity="0.75"/>
  <polygon points="236,162 242,170 236,178 230,170"
    fill="#F5A623" opacity="0.45"/>
  <polygon points="276,162 282,170 276,178 270,170"
    fill="#F5A623" opacity="0.45"/>

  <!-- ── Cambodia flag strip ── -->
  <rect x="172" y="432" width="54" height="12" rx="6" fill="#B8C9EC" opacity="0.9"/>
  <rect x="229" y="432" width="54" height="12" rx="6" fill="#E00025" opacity="0.95"/>
  <rect x="286" y="432" width="54" height="12" rx="6" fill="#F5A623" opacity="0.95"/>
</svg>
